name = "certkokonut"
main = "src/index.ts"
compatibility_date = "2024-03-03"

# 프론트엔드 정적 파일 서빙 설정 (통합 배포)
[site]
bucket = "../frontend/dist"

# D1 데이터베이스 바인딩 설정
[[d1_databases]]
binding = "DB" # 코드 내에서 액세스할 이름
database_name = "cert_kokonut_db"
database_id = "20fd8dda-f65f-4fa6-81ff-e72399f78d56" # 실제 생성된 ID 반영 완료!

# 환경 변수 정의
[vars]
JWT_SECRET = "super-secret-key-for-cert"
MASTER_KEY = "master-key-for-aes-256-gcm"
