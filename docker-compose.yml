# PMS Center 도커 오케스트레이션 설정
services:
  pms-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pms-backend
    restart: always
    ports:
      - "8081:8080"
    # ✅ [보안 개정] 데이터 영구 보존을 위한 볼륨 매핑
    volumes:
      - ./backend/local_db.json:/app/local_db.json
    networks:
      - pms-network

  pms-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pms-frontend
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - pms-backend
    networks:
      - pms-network

networks:
  pms-network:
    driver: bridge
