version: '3.8'

services:
  # 통합 개발 환경 서비스
  dev-env:
    build: .
    container_name: cert-dev-container
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "5173:5173" # Frontend (Vite)
      - "8788:8787" # Backend (Wrangler Dev) - 컨테이너 내부 8787을 호스트 8788로 바인딩
    environment:
      - NODE_ENV=development
    stdin_open: true
    tty: true

networks:
  default:
    name: cert-network
