# version: '3.8'

services:
  # PMS 백엔드 API 서비스
  pms-backend:
    build: ./backend
    container_name: pms-api-server
    ports:
      - "8081:8080" # 기존 8080 포트 충돌로 인해 8081로 우회 조치!
    environment:
      - NODE_ENV=production
      - APP_ID=pms-service-id
      - ENCRYPTION_KEY=cert_total_manager_secure_key_256
    volumes:
      - ./backend/local_db.json:/app/local_db.json
    networks:
      - pms-network

  # PMS 프론트엔드 대시보드 (Vite Dev Server 또는 Static Serve용)
  pms-frontend:
    image: node:18-alpine
    container_name: pms-ui-dashboard
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    networks:
      - pms-network
    depends_on:
      - pms-backend

networks:
  pms-network:
    driver: bridge
